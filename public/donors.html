<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Find Donors — LifeLink</title>
<link rel="stylesheet" href="style.css" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 2rem;
  padding: 2rem 0;
}

.panel {
  background: white;
  padding: 1.5rem;
  border-radius: 12px;
  box-shadow: var(--shadow);
  position: sticky;
  top: 90px;
}

.panel h3 {
  margin-bottom: 1rem;
  color: var(--red-main);
}

#map {
  height: 400px;
  border-radius: 12px;
  margin-bottom: 1.5rem;
}

.card {
  background: white;
  padding: 1rem 1.2rem;
  border-radius: 10px;
  margin-bottom: .8rem;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card h4 {
  margin-bottom: 4px;
}

.tag {
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 20px;
  background: #fdecea;
  color: #c0392b;
}

.ok { color: green; font-weight: bold; }
.wait { color: orange; font-weight: bold; }

@media(max-width: 768px){
  .layout { grid-template-columns: 1fr; }
  .panel { position: static; }
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo">🩸 LifeLink</div>
  <ul class="nav-links">
    <li><a href="/">Home</a></li>
    <li><a href="donors.html" class="active">Find Donors</a></li>
    <li><a href="hospitals.html">Blood Banks</a></li>
    <li><a href="request.html">Request Blood</a></li>
    <li><a href="register.html" class="nav-cta">Become a Donor</a></li>
  </ul>
</nav>

<div class="container">
  <h1>Find Nearby Donors</h1>

  <div class="layout">

    <!-- FILTER -->
    <div class="panel">
      <h3>🔍 Filters</h3>

      <div class="form-group">
        <label>Blood Type</label>
        <select id="filter-blood">
          <option value="">All</option>
          <option>A+</option><option>A-</option>
          <option>B+</option><option>B-</option>
          <option>AB+</option><option>AB-</option>
          <option>O+</option><option>O-</option>
        </select>
      </div>

      <div class="form-group">
        <label>City</label>
        <input type="text" id="filter-city" placeholder="Chennai">
      </div>

      <button class="btn btn-primary" style="width:100%" onclick="searchDonors()">
        Search
      </button>

      <p style="font-size:.8rem;margin-top:1rem;">
        ✅ Eligible<br>
        🟡 Recently donated
      </p>
    </div>

    <!-- RESULTS -->
    <div>
      <div id="map"></div>
      <div id="list">
        <p>Loading donors...</p>
      </div>
    </div>

  </div>
</div>

<footer>
  <p>🩸 LifeLink — Connecting lives</p>
</footer>

<script>
const map = L.map("map").setView([13.0827, 80.2707], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
  .addTo(map);

let markers = [];

function validateFilters() {
  const city = document.getElementById("filter-city").value.trim();
  if (!city) return true;

  if (!/^[A-Za-z\s]+$/.test(city)) {
    alert("City must contain only letters");
    return false;
  }
  return true;
}

async function searchDonors() {
  if (!validateFilters()) return;

  const blood = document.getElementById("filter-blood").value;
  const city  = document.getElementById("filter-city").value.trim();

  let url = "/api/donors?";
  if (blood) url += `bloodType=${encodeURIComponent(blood)}&`;
  if (city)  url += `city=${encodeURIComponent(city)}`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    render(data);
    plot(data);
  } catch {
    document.getElementById("list").innerHTML = "Error loading donors";
  }
}

function render(donors) {
  const el = document.getElementById("list");

  if (!donors.length) {
    el.innerHTML = "No donors found";
    return;
  }

  const today = new Date();

  el.innerHTML = donors.map(d => {
    let ok = true;

    if (d.lastDonationDate) {
      const days = (today - new Date(d.lastDonationDate)) / (1000*60*60*24);
      ok = days >= 90;
    }

    return `
      <div class="card">
        <div>
          <h4>${d.name}</h4>
          <small>${d.location.city}</small>
        </div>

        <div style="text-align:right">
          <div class="tag">${d.bloodType}</div>
          <div class="${ok ? 'ok' : 'wait'}">
            ${ok ? 'Eligible' : 'Wait'}
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function plot(donors) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const bounds = [];

  donors.forEach(d => {
    if (d.location.lat && d.location.lng) {
      const m = L.marker([d.location.lat, d.location.lng])
        .bindPopup(`<b>${d.name}</b><br>${d.bloodType}`);

      m.addTo(map);
      markers.push(m);
      bounds.push([d.location.lat, d.location.lng]);
    }
  });

  if (bounds.length) map.fitBounds(bounds);
}

searchDonors();
</script>

</body>
</html>
